<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>neuro august</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 512'%3E%3Cpath fill='%23ff3b3b' d='M320 0c17.7 0 32 14.3 32 32V96H472c39.8 0 72 32.2 72 72V440c0 39.8-32.2 72-72 72H168c-39.8 0-72-32.2-72-72V168c0-39.8 32.2-72 72-72H288V32c0-17.7 14.3-32 32-32zM208 384c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H208zm96 0c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H304zm96 0c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H400zM264 256a40 40 0 1 0 -80 0 40 40 0 1 0 80 0zm152 40a40 40 0 1 0 0-80 40 40 0 1 0 0 80zM48 224H64V416H48c-26.5 0-48-21.5-48-48V272c0-26.5 21.5-48 48-48zm544 0c26.5 0 48 21.5 48 48v96c0 26.5-21.5 48-48 48H576V224h16z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_login.css">
    <script type="text/javascript" src="/eel.js"></script>
</head>
<body>
    <!-- Основное приложение -->
    <div class="app-container" id="appContainer">
        <!-- Боковая панель с диалогами -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="app-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
                        <path fill="#ff3b3b" d="M320 0c17.7 0 32 14.3 32 32V96H472c39.8 0 72 32.2 72 72V440c0 39.8-32.2 72-72 72H168c-39.8 0-72-32.2-72-72V168c0-39.8 32.2-72 72-72H288V32c0-17.7 14.3-32 32-32zM208 384c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H208zm96 0c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H304zm96 0c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H400zM264 256a40 40 0 1 0 -80 0 40 40 0 1 0 80 0zm152 40a40 40 0 1 0 0-80 40 40 0 1 0 0 80zM48 224H64V416H48c-26.5 0-48-21.5-48-48V272c0-26.5 21.5-48 48-48zm544 0c26.5 0 48 21.5 48 48v96c0 26.5-21.5 48-48 48H576V224h16z"/>
                    </svg>
                </div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item active" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    <span>Новый чат</span>
                </button>
            </div>
            
            <div class="sidebar-section">
                <div class="section-title">Недавние</div>
                <div class="dialogs-list" id="dialogsList">
                    <!-- Список диалогов загружается динамически -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-profile" id="userProfile">
                    <div class="user-profile-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Войти</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Основная область -->
        <main class="main-content">
            <header>
                <div class="header-left">
                    <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
                        <path fill="#ff3b3b" d="M320 0c17.7 0 32 14.3 32 32V96H472c39.8 0 72 32.2 72 72V440c0 39.8-32.2 72-72 72H168c-39.8 0-72-32.2-72-72V168c0-39.8 32.2-72 72-72H288V32c0-17.7 14.3-32 32-32zM208 384c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H208zm96 0c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H304zm96 0c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H400zM264 256a40 40 0 1 0 -80 0 40 40 0 1 0 80 0zm152 40a40 40 0 1 0 0-80 40 40 0 1 0 0 80zM48 224H64V416H48c-26.5 0-48-21.5-48-48V272c0-26.5 21.5-48 48-48zm544 0c26.5 0 48 21.5 48 48v96c0 26.5-21.5 48-48 48H576V224h16z"/>
                    </svg>
                    <h1>neuro august</h1>
                </div>
                <div class="header-right">
                    <button class="settings-btn" id="selectFolderBtn" title="Настройки сохранения">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12.8799V11.1199C2 10.0799 2.85 9.21994 3.9 9.21994C5.71 9.21994 6.45 7.93994 5.54 6.36994C5.02 5.46994 5.33 4.29994 6.24 3.77994L7.97 2.78994C8.76 2.31994 9.78 2.59994 10.25 3.38994L10.36 3.57994C11.26 5.14994 12.74 5.14994 13.65 3.57994L13.76 3.38994C14.23 2.59994 15.25 2.31994 16.04 2.78994L17.77 3.77994C18.68 4.29994 18.99 5.46994 18.47 6.36994C17.56 7.93994 18.3 9.21994 20.11 9.21994C21.15 9.21994 22.01 10.0699 22.01 11.1199V12.8799C22.01 13.9199 21.16 14.7799 20.11 14.7799C18.3 14.7799 17.56 16.0599 18.47 17.6299C18.99 18.5399 18.68 19.6999 17.77 20.2199L16.04 21.2099C15.25 21.6799 14.23 21.3999 13.76 20.6099L13.65 20.4199C12.75 18.8499 11.27 18.8499 10.36 20.4199L10.25 20.6099C9.78 21.3999 8.76 21.6799 7.97 21.2099L6.24 20.2199C5.33 19.6999 5.02 18.5299 5.54 17.6299C6.45 16.0599 5.71 14.7799 3.9 14.7799C2.85 14.7799 2 13.9199 2 12.8799Z" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <div class="balance-info">
                        <span class="balance-label">Баланс:</span>
                        <span class="balance-amount" id="balance">—</span>
                    </div>
                </div>
            </header>

            <div class="chat-container">
                <div id="messages" class="messages"></div>
                
                <div class="input-area">
                    <div class="input-wrapper">
                        <div id="previewImages" class="preview-images"></div>
                        <div class="input-controls">
                            <textarea 
                                id="prompt" 
                                placeholder="Опишите изображение или задайте вопрос..."
                                rows="1"
                            ></textarea>
                            <div class="input-buttons">
                                <button class="attach-btn" id="attachBtn" title="Прикрепить изображения">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                                    </svg>
                                </button>
                                <button class="generate-btn" id="generateBtn" title="Отправить">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" multiple>
                </div>
            </div>
        </main>

        <!-- Модальное окно настроек -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Настройки</h2>
                    <button class="close-modal" id="closeModal">×</button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label>API ключ Polza.ai</label>
                        <p class="setting-description">
                            Введите ваш API ключ от Polza.ai для использования генерации изображений
                        </p>
                        <div class="api-key-input">
                            <input type="password" id="apiKeyInput" placeholder="pza_...">
                            <button id="saveApiKeyBtn">Сохранить</button>
                        </div>
                    </div>
                    
                    <div class="setting-item">
                        <label>Папка для сохранения диалогов</label>
                        <p class="setting-description">
                            Выберите папку, куда будут автоматически сохраняться все ваши диалоги с изображениями и промптами
                        </p>
                        <div class="folder-select">
                            <input type="text" id="folderPathInput" readonly placeholder="Папка не выбрана">
                            <button id="browseFolderBtn">Обзор</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальное окно профиля -->
        <div class="modal" id="profileModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Личный кабинет</h2>
                    <button class="close-modal" id="closeProfileModal">×</button>
                </div>
                <div class="modal-body">
                    <div id="profileContent">
                        <!-- Контент загружается динамически -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Кастомное уведомление -->
        <div class="custom-alert" id="customAlert">
            <div class="custom-alert-content">
                <div class="custom-alert-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <div class="custom-alert-text">
                    <h3 id="customAlertTitle">Внимание</h3>
                    <p id="customAlertMessage">Сообщение</p>
                </div>
                <button class="custom-alert-btn" id="customAlertBtn">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
